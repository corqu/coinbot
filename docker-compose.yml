services:
  db:
    image: mysql:8.0
    container_name: autotrading-db
    ports:
      - "3307:3306"
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d # 초기 SQL 필요 시
    restart: on-failure
    env_file:
      - .env.dev
    environment:
      MYSQL_DATABASE: autotrading
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD} # 일반 유저 비번
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul

  redis:
    image: redis:7-alpine
    container_name: autotrading-redis
    env_file:
      - .env.dev
    ports:
      - "6379:6379"
    volumes:
      - ./db/redis:/data
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: on-failure

  python-server:
    image: auto-python
    container_name: autotrading-python-server
    ports:
      - "8001:8001"
    env_file:
      - .env.dev
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: autotrading-kafka
    restart: on-failure
    ports:
      - "9092:9092"
      - "29092:29092"
    env_file:
      - .env.dev
    environment:
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
